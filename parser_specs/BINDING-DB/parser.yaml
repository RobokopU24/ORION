source_id: BINDING-DB-Croissant
provenance_id: infores:bindingdb
parsing_version: "2.0"

croissant:
  path: bindingdb_croissant.json
  dataset_id: bindingdb
  version_from: dataset.version

input:
  distribution: bindingdb/all_tsv_fileset
  record_set: bindingdb/binding_data
  format: tsv
  header: true
  delimiter: "\t"
  archive_member: BindingDB_All.tsv
  test_mode_limit: 10000

derived_fields:
  ligand_id:
    op: template
    value: "PUBCHEM.COMPOUND:{pubchem_cid}"
  protein_id:
    op: template
    value: "UniProtKB:{chain1_swissprot_primary_id}"
  measurements:
    op: fanout_measurements
    measurements:
      - value_field: ki_nm
        measurement_type: pKi
        predicate: "{DGIDB}:inhibitor"
      - value_field: ic50_nm
        measurement_type: pIC50
        predicate: "CTD:decreases_activity_of"
      - value_field: kd_nm
        measurement_type: pKd
        predicate: "RO:0002436"
      - value_field: ec50_nm
        measurement_type: pEC50
        predicate: "CTD:increases_activity_of"

row_filters:
  - exists: pubchem_cid
  - exists: chain1_swissprot_primary_id

emit:
  nodes: []
  edges: []

aggregate:
  foreach:
    op: field
    name: measurements
  group_by:
    - op: field
      name: ligand_id
    - op: field
      name: protein_id
    - op: item
      path: measurement_type
    - op: item
      path: predicate
  reducers:
    supporting_affinities_nm:
      op: collect_list
      value:
        op: parse_qualified_float
        value:
          op: item
          path: value
        reject_operators: [">"]
        strip_operators: ["<"]
        minimum_exclusive: 0
    publications:
      op: collect_unique
      when:
        op: parse_qualified_float
        value:
          op: item
          path: value
        reject_operators: [">"]
        strip_operators: ["<"]
        minimum_exclusive: 0
      value:
        op: prefix_if_present
        field: pmid
        prefix: "PMID:"
    pubchem_assay_ids:
      op: collect_unique
      when:
        op: parse_qualified_float
        value:
          op: item
          path: value
        reject_operators: [">"]
        strip_operators: ["<"]
        minimum_exclusive: 0
      value:
        op: prefix_if_present
        field: pubchem_aid
        prefix: "PUBCHEM.AID:"
    patent_ids:
      op: collect_unique
      when:
        op: parse_qualified_float
        value:
          op: item
          path: value
        reject_operators: [">"]
        strip_operators: ["<"]
        minimum_exclusive: 0
      value:
        op: prefix_if_present
        field: patent_number
        prefix: "PATENT:"
  finalize:
    affinity:
      op: neglog10_nm
      value:
        op: mean
        field: supporting_affinities_nm
      precision: 2
    supporting_affinities:
      op: map_each
      value:
        op: aggregate_value
        name: supporting_affinities_nm
      with:
        op: neglog10_nm
        value:
          op: item
        precision: 2
  filters:
    - non_empty: supporting_affinities_nm
  emit:
    nodes:
      - id:
          op: group_key
          index: 0
      - id:
          op: group_key
          index: 1
    edges:
      - subject:
          op: group_key
          index: 0
        predicate:
          op: group_key
          index: 3
        object:
          op: group_key
          index: 1
        properties:
          ligand:
            op: group_key
            index: 0
          protein:
            op: group_key
            index: 1
          affinity_parameter:
            op: group_key
            index: 2
          supporting_affinities:
            op: aggregate_value
            name: supporting_affinities
          publications:
            op: aggregate_value
            name: publications
          pubchem_assay_ids:
            op: aggregate_value
            name: pubchem_assay_ids
          patent_ids:
            op: aggregate_value
            name: patent_ids
          knowledge_level: knowledge_assertion
          agent_type: manual_agent
          affinity:
            op: aggregate_value
            name: affinity
