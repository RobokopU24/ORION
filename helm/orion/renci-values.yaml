# Values for running ORION on Sterling at RENCI

replicaCount: 1

# See the default values.yaml file for descriptions of options
orion:
  graphID: "all"
  graphSpecUrl: ""
  graphSpecYaml: ""
  optionalGraphSpec: ""
  buildMode: true
  image:
    repository: ghcr.io/robokopu24/orion
    pullPolicy: IfNotPresent
    tag: v1.3.3
  graphsVolume:
    use_nfs: true
    nfs_server: na-projects.edc.renci.org
    nfs_path: /stars/Data_services
    nfs_mount_subpath: biolink3/graphs/
  sourcesVolume:
    use_nfs: true
    nfs_server: na-projects.edc.renci.org
    nfs_path: /stars/Data_services
    nfs_mount_subpath: biolink3/storage/
  extraVolume:
    use_extra_volume: true
    nfs_server: na-projects.edc.renci.org
    nfs_path: /stars/Data_services
    nfs_mount_subpath: sterling/
  neo4jScratchVolume:
    size: 80Gi
  resources:
    limits:
      cpu: "2500m"
      memory: 40Gi
      ephemeral-storage: 2Gi
    requests:
      cpu: "2500m"
      memory: 32Gi
      ephemeral-storage: 1Gi
  securityContext:
    runAsUser: 30000
    runAsGroup: 1000
  normalization:
    nodeNormEndpoint: https://nodenormalization-sri.renci.org/
    edgeNormEndpoint: https://bl-lookup-sri.renci.org/
    nameResolverEndpoint: https://name-resolution-sri.renci.org/
    sapbertEndpoint: https://sap-qdrant.apps.renci.org/
    bl_version: 4.3.5
  outputURL: https://robokop.renci.org/graphs/

pharos:
  host: pod-host-or-ip
  port: 3306
  user: ds-user
  password: ds-pass
  db_name: PHAROS

drugcentral:
  host: unmtid-dbs.net
  port: 5433
  user: drugman
  password: dosage
  db_name: drugcentral
  # host: pod-host-or-ip
  # port: 5432
  # user: dc-user
  # password: dc-pass

